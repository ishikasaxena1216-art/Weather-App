<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type ="text" placeholder="Enter city name"
            spellcheck= "false">
            <button><img src="search3.png" ></button>
        </div>
        <div class="error">
            <p>Invalid City Name !!</p>
        </div>
        <div class="weather">
            <img src="https://img.icons8.com/?size=200&id=VY9MLUH4ggfo&format=png&color=000000" class="weather-icon">
            <h1 class="temp">22°C</h1>
            <h2 class="city">New York</h2>
            <div class="details">
                
                <div class="col">
                    <img src="humidity.png" >
                    <div> 
                    <p class="humidity">50%</p>
                    <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="air.png" >
                    <div> 
                    <p class="wind">15km/h</p>
                    <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
      const apikey = "50f33f48ade37b96162a7dbd95b9f52b";
      const apiUrl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";
      
      const searchBox = document.querySelector(".search input");
      const searchBtn = document.querySelector(".search button");
      const weatherIcon = document.querySelector(".weather-icon");

      async function checkWeather(city){
        const response = await fetch(apiUrl + city + `&appid=${apikey}`);

        if(response.status == 404){
            document.querySelector(".error").style.display = "block";
            document.querySelector(".weather").style.display = "none";       
         } else{
            var data = await response.json();

            let currentTime = data.dt;
            let sunrise = data.sys.sunrise;
            let sunset = data.sys.sunset;

            let isDay = currentTime >= sunrise && currentTime < sunset; 
       

        document.querySelector(".city").innerHTML = data.name;
        document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°C";
        document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
        document.querySelector(".wind").innerHTML = data.wind.speed + " km/hr";

        if(data.weather[0].main == "Clouds"){
            weatherIcon.src = "cloudy.png";

        }else if(data.weather[0].main == "Clear"){
            if(isDay){
            weatherIcon.src = "sun-2.png";
            }else {
            weatherIcon.src = "moon.png";    
            }

        }else if(data.weather[0].main == "Rain"){
            weatherIcon.src = "rain.png";
        }else if(data.weather[0].main == "Drizzle"){
            weatherIcon.src = "drizzle.png";
        }else if(data.weather[0].main == "Mist"){
            weatherIcon.src = "mist.png";
        }else if(data.weather[0].main == "Snow"){
            weatherIcon.src = "snow.png";
        }

            if(isDay){
                document.body.style.background = "linear-gradient(to right, #87CEEB, #ffffff)";
          } else {
                document.body.style.background = "linear-gradient(to right, #0b1d3a, #000000)";
        }
        

        document.querySelector(".weather").style.display = "block";
        document.querySelector(".error").style.display = "none";
            
         }
        
      }

      searchBtn.addEventListener("click", ()=>{
        checkWeather(searchBox.value);
      })
      

    </script>

</body>
</html>
